<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form for RG Built Corp construction services.">
    <meta name="author" content="Argy Milan">
    <title>Product Review | RG Built Corp</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="productName">Construction Service</label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating">
                    <label for="rating1">&star;<input type="radio" id="rating1" name="rating" value="1" required></label>
                    <label for="rating2">&star;&star;<input type="radio" id="rating2" name="rating" value="2" required></label>
                    <label for="rating3">&star;&star;&star;<input type="radio" id="rating3" name="rating" value="3" required></label>
                    <label for="rating4">&star;&star;&star;&star;<input type="radio" id="rating4" name="rating" value="4" required></label>
                    <label for="rating5">&star;&star;&star;&star;&star;<input type="radio" id="rating5" name="rating" value="5" required></label>
                </div>
            </fieldset>

            <label for="installDate">Date of Project Completion</label>
            <input type="date" id="installDate" name="installDate" required>

            <fieldset>
                <legend>Which features did you find useful in the service? <span>(Check all that apply)</span></legend>

                <label class="checkbox-label" for="quality">
                    <input type="checkbox" id="quality" name="features" value="quality">
                    Work Quality
                </label>

                <label class="checkbox-label" for="communication">
                    <input type="checkbox" id="communication" name="features" value="communication">
                    Communication
                </label>

                <label class="checkbox-label" for="timeline">
                    <input type="checkbox" id="timeline" name="features" value="timeline">
                    Project Timeline
                </label>

                <label class="checkbox-label" for="planning">
                    <input type="checkbox" id="planning" name="features" value="planning">
                    Design and Planning
                </label>
            </fieldset>

            <label for="review">Written Review <span>(Optional)</span></label>
            <textarea id="review" name="review" rows="6"></textarea>

            <label for="userName">Your Name <span>(Optional)</span></label>
            <input type="text" id="userName" name="userName">

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span>
            🔥 Argy Milan 🔥 Philippines
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
