<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact RG Built Corp for construction inquiries and quotations.">
    <meta name="author" content="Argy Milan">
    <title>Contact | RG Built Corp</title>

    <link rel="stylesheet" href="styles/project.css">
    <script src="scripts/project.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="images/logo.png" alt="RG Built Corp logo" class="logo">
            <button id="menu" aria-label="Open navigation menu"></button>

            <nav>
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-title">
            <h1>Contact Us</h1>
            <p>Send us your project details and we will get back to you.</p>
        </section>

        <section class="form-section">
            <form id="contactForm">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="projectType">Project Type</label>
                <select id="projectType" name="projectType" required>
                    <option value="" disabled selected>Select Project Type ...</option>
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial</option>
                    <option value="renovation">Renovation</option>
                    <option value="fitout">Fit-out</option>
                </select>

                <label for="serviceNeeded">Service Needed</label>
                <select id="serviceNeeded" name="serviceNeeded" required>
                    <option value="" disabled selected>Select Service ...</option>
                    <option value="general">General Construction</option>
                    <option value="architectural">Architectural Works</option>
                    <option value="civil">Civil Works</option>
                    <option value="mepf">MEPF Works</option>
                </select>

                <label for="message">Project Details</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit">Send Inquiry</button>
            </form>

            <div id="formMessage"></div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> 🔥 Argy Milan 🔥 Philippines</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
