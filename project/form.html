<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Service Review | RG Built Corp</title>

    <meta name="description" content="Service review form for RG Built Corp construction services.">
    <meta name="author" content="Argy Milan">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/project.css">
    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/project.js" defer></script>
    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <div class="header-content">

            <img src="images/logo.jpg" alt="RG Built Corp Logo" class="logo">

            <button id="menu" aria-label="Navigation Menu"></button>

            <nav>
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
                <a href="form.html">Service Review</a>
            </nav>

        </div>
    </header>

    <main>

        <section class="page-title">
            <h1>Service Review</h1>
            <p>
                Tell us about your experience with RG Built Corp construction services.
            </p>
        </section>

        <section class="form-section review-form-section">

            <form method="get" action="review.html">

                <label for="productName">
                    Construction Service
                </label>

                <select id="productName" name="productName" required>
                    <option value="" disabled selected>
                        Select a Product ...
                    </option>
                </select>

                <fieldset>

                    <legend>Overall Rating</legend>

                    <div class="rating">

                        <label for="rating1">
                            ☆
                            <input
                                type="radio"
                                id="rating1"
                                name="rating"
                                value="1"
                                required
                            >
                        </label>

                        <label for="rating2">
                            ☆☆
                            <input
                                type="radio"
                                id="rating2"
                                name="rating"
                                value="2"
                                required
                            >
                        </label>

                        <label for="rating3">
                            ☆☆☆
                            <input
                                type="radio"
                                id="rating3"
                                name="rating"
                                value="3"
                                required
                            >
                        </label>

                        <label for="rating4">
                            ☆☆☆☆
                            <input
                                type="radio"
                                id="rating4"
                                name="rating"
                                value="4"
                                required
                            >
                        </label>

                        <label for="rating5">
                            ☆☆☆☆☆
                            <input
                                type="radio"
                                id="rating5"
                                name="rating"
                                value="5"
                                required
                            >
                        </label>

                    </div>

                </fieldset>

                <label for="installDate">
                    Date of Project Completion
                </label>

                <input
                    type="date"
                    id="installDate"
                    name="installDate"
                    required
                >

                <fieldset>

                    <legend>
                        Useful Features
                        <br>
                        <small>(Check all that apply)</small>
                    </legend>

                    <label class="checkbox-label" for="quality">
                        <input
                            type="checkbox"
                            id="quality"
                            name="features"
                            value="quality"
                        >
                        Work Quality
                    </label>

                    <label class="checkbox-label" for="communication">
                        <input
                            type="checkbox"
                            id="communication"
                            name="features"
                            value="communication"
                        >
                        Communication
                    </label>

                    <label class="checkbox-label" for="timeline">
                        <input
                            type="checkbox"
                            id="timeline"
                            name="features"
                            value="timeline"
                        >
                        Project Timeline
                    </label>

                    <label class="checkbox-label" for="planning">
                        <input
                            type="checkbox"
                            id="planning"
                            name="features"
                            value="planning"
                        >
                        Design & Planning
                    </label>

                    <label class="checkbox-label" for="safety">
                        <input
                            type="checkbox"
                            id="safety"
                            name="features"
                            value="safety"
                        >
                        Site Safety
                    </label>

                </fieldset>

                <label for="review">
                    Written Review
                    <span>(Optional)</span>
                </label>

                <textarea
                    id="review"
                    name="review"
                    rows="6"
                    placeholder="Tell us about your experience..."
                ></textarea>

                <label for="userName">
                    Your Name
                    <span>(Optional)</span>
                </label>

                <input
                    type="text"
                    id="userName"
                    name="userName"
                    placeholder="Enter your name"
                >

                <input
                    type="submit"
                    value="Submit Service Review"
                    class="submit-button"
                >

            </form>

        </section>

    </main>

    <footer>
        <p>
            &copy;
            <span id="currentyear"></span>
            🔥 Argy Milan 🔥 Philippines
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
