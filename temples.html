<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A responsive temple album showcasing a gallery of beautiful Philippine temple images with captions, grid layouts, and a mobile-friendly hamburger navigation menu that applies web development concepts from the learning activities for both small and larger screen views with interactive user features.">
    <meta name="author" content="Argy Milan">

    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <h2>Temple Album</h2>
        <button id="menu" aria-label="Menu"></button>

        <nav>
            <a href="#">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h1>Temple Album</h1>

        <figure>
            <img src="images/manila-temple.jpg" alt="Manila Philippines Temple">
            <figcaption>Manila Philippines Temple</figcaption>
        </figure>

        <figure>
            <img src="images/cebu-temple.jpg" alt="Cebu City Philippines Temple">
            <figcaption>Cebu City Philippines Temple</figcaption>

        <figure>

        <figure>
            <img src="images/bacolod-temple.jpg" alt="Bacolod Philippines Temple">
            <figcaption>Bacolod Philippines Temple</figcaption>
        </figure>

        <figure>
            <img src="images/cdo-temple.jpg" alt="Cagayan de Oro Philippines Temple">

        </figure>

        <figure>
            <img src="images/urdaneta-temple.jpg" alt="Urdaneta Philippines Temple">
            <figcaption>Urdaneta Philippines Temple</figcaption>
        </figure>

        <figure>
            <img src="images/tacloban-temple.jpg" alt="Tacloban Philippines Temple">
            <figcaption>Tacloban Philippines Temple</figcaption>
        </figure>

        <figure>
            <img src="images/naga-temple.jpg" alt="Naga Philippines Temple">

        <figure>
            <img src="images/laoag-temple.jpg" alt="Laoag Philippines Temple">

        </figure>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Argy Milan | Philippines</p>
