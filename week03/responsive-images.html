<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Responsive image activity using picture elements and WebP image formats.">
    <meta name="author" content="Argy Milan">

    <title>Responsive Images</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        main {
            max-width: 1500px;
            margin: 0 auto;
        }

        .hero img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body>

    <main>
        <div class="hero">

            <picture>
                <source
                    srcset="images/hero-large.webp"
                    media="(min-width: 1000px)"
                >

                <source
                    srcset="images/hero-medium.webp"
                    media="(min-width: 500px)"
                >

                <img
                    src="images/hero-small.webp"
                    alt="Temple surrounded by mountains and nature"
                    width="1500"
                    height="750"
                >
            </picture>

        </div>
    </main>

</body>
</html>
